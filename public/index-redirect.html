<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CizreApp</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #667eea; font-size: 32px; margin-bottom: 20px; }
        p { color: #7F8C8D; line-height: 1.6; margin-bottom: 30px; }
        .store-badge {
            display: inline-block;
            margin: 10px;
            padding: 15px 30px;
            background: #1ABC9C;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .store-badge:hover { background: #16A085; transform: scale(1.05); }
        .app-info {
            background: #F8F9FA;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 CizreApp</h1>
        <p>Cizre'nin Dijital Pazarı & Sosyal Medya Ağı</p>
        
        <div style="margin: 30px 0;">
            <a href="https://play.google.com/store/apps/details?id=com.cizreapp.app" class="store-badge">
                📱 Google Play'den İndir
            </a>
            <a href="https://apps.apple.com/app/cizreapp" class="store-badge" style="background: #000;">
                🍎 App Store'dan İndir
            </a>
        </div>
        
        <div class="app-info">
            <h3 style="color: #2C3E50; margin-bottom: 10px;">Nasıl Giriş Yapılır?</h3>
            <p style="font-size: 14px; color: #7F8C8D; margin: 0;">
                Uygulamayı indirin → Kayıt olun veya giriş yapın → CizreApp dünyasına katılın!
            </p>
        </div>
    </div>
</body>
</html>
