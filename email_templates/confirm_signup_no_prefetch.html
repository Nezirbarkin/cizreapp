<!-- 
    CizreApp - Confirm Signup Email Template
    Gmail Prefetching Koruması:
    Linkleri POST butonu ile göndererek Gmail'in GET ile prefetch yapmasını engeller
    
    SUPABASE EMAIL TEMPLATE AYARLARI:
    Bunu Supabase Dashboard > Authentication > Email Templates > Confirm Signup kısmına yapıştırın
-->

<div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #ffffff;">
    
    <div style="text-align: center; padding: 20px 0;">
        <h1 style="color: #1ABC9C; font-size: 28px; margin: 0;">CizreApp</h1>
    </div>

    <div style="padding: 20px 0;">
        <h2 style="color: #2C3E50; text-align: center; font-size: 20px;">Hesabınızı Doğrulayın</h2>
        <p style="color: #7F8C8D; text-align: center; line-height: 1.6;">
            CizreApp'a kayıt olduğunuz için teşekkürler!<br>
            Hesabınızı aktifleştirmek için aşağıdaki butona tıklayın.
        </p>
    </div>

    <!-- 
        POST FORM kullanarak Gmail prefetching'i engelliyoruz
        Gmail sadece GET linklerini prefetch ediyor, POST formları tarayıcıdan tıklanması gerekiyor
    -->
    <div style="text-align: center; padding: 20px 0;">
        <form method="POST" action="https://xsbukxkgtmdyickknqzf.supabase.co/auth/v1/verify" style="display: inline;">
            <input type="hidden" name="token" value="{{ .Token }}">
            <input type="hidden" name="type" value="signup">
            <input type="hidden" name="redirect_to" value="https://www.cizreapp.com/verify">
            <button type="submit" style="background-color: #1ABC9C; color: #ffffff; padding: 16px 40px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; letter-spacing: 0.5px;">
                ✉️ Emailimi Onaylıyorum
            </button>
        </form>
    </div>

    <div style="background-color: #FEF5E7; border: 1px solid #F9E79F; border-radius: 8px; padding: 12px 16px; margin: 16px 0;">
        <p style="color: #7D6608; font-size: 13px; margin: 0; text-align: center;">
            <strong>⏰ Not:</strong> Bu link <strong>1 saat</strong> içinde geçerlidir.
        </p>
    </div>

    <div style="border-top: 1px solid #EEEEEE; padding: 20px 0 0; text-align: center; margin-top: 20px;">
        <p style="color: #BDC3C7; font-size: 11px; margin: 0;">
            Bu işlemi siz yapmadıysanız bu e-postayı dikkate almayın.
        </p>
        <p style="color: #BDC3C7; font-size: 11px; margin: 8px 0 0;">
            © 2026 CizreApp. Tüm hakları saklıdır.
        </p>
    </div>
</div>
