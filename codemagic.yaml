workflows:
  ios-appstore:
    name: iOS App Store
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.cizreapp.app
        create_profile: true
    triggering:
      branch_patterns:
        - pattern: main
          include: true
          source: false
      events:
        - push
        - tag
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.cizreapp.app" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS App Store
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
