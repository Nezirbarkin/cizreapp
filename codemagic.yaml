workflows:
  ios-shorebird:
    name: iOS Shorebird
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.cizreapp.app
        TEAM_ID: 7RY64FSMUS
      groups:
        - cizreapp
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
          cd ios && pod install && cd ..
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Set up provisioning profiles
        script: |
          app-store-connect fetch-signing-files $BUNDLE_ID --type IOS_APP_STORE
      - name: Build iOS with Shorebird
        script: |
          shorebird release ios --export-options-plist=ios/Flutter/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
