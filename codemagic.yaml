workflows:
  ios-appstore:
    name: iOS App Store
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up Podfile with minimum iOS 15.0
        script: |
          cd ios
          if ! grep -q "platform :ios, '15.0'" Podfile; then
            echo 'platform :ios, "15.0"' > Podfile.tmp
            cat Podfile >> Podfile.tmp
            mv Podfile.tmp Podfile
          fi
          cd ..
      - name: Get Flutter dependencies
        script: |
          flutter pub get
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.cizreapp.app" --type IOS_APP_STORE --create
      - name: Build iOS
        script: |
          flutter build ipa --release \
            --export-options-plist=ios/export_options.plist \
            --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
