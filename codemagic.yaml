workflows:
  ios-appstore:
    name: iOS App Store Dağıtım
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      branch_patterns:
        - pattern: main
          include: true
      events:
        - push
    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: iOS Dependencies
        script: |
          cd ios && pod install --repo-update && cd ..

      - name: Build iOS IPA
        script: |
          flutter build ipa --release --export-options-plist=ios/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/ipa/*.dSYM
