workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.cizreapp.app
        TEAM_ID: 7RY64FSMUS
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Flutter dependencies
        script: |
          flutter pub get
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Set up provisioning profiles
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE
      - name: Get CocoaPods dependencies
        script: |
          cd ios && pod install && cd ..
      - name: Build iOS IPA
        script: |
          flutter build ipa --release --export-options-plist=ios/Flutter/ExportOptions.plist --codesign=false
    artifacts:
      - build/ios/ipa/*.ipa
