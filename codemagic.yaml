workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
          cd ios && pod install && cd ..
      - name: Build iOS
        script: |
          flutter build ipa --release --export-options-plist=ios/Flutter/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
