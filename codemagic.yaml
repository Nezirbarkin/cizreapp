workflows:
  ios-appstore:
    name: iOS App Store Dağıtım
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        APP_ID: com.cizreapp.app
        APP_STORE_CONNECT_KEY_ID: 4RC8R99NC7
      groups:
        - appstore
    triggering:
      branch_patterns:
        - pattern: main
          include: true
      events:
        - push
    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Set up keychain
        script: |
          keychain initialize

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$APP_ID" \
            --type IOS_APP_STORE \
            --create

      - name: iOS Dependencies
        script: |
          cd ios && pod install --repo-update && cd ..

      - name: Build iOS IPA
        script: |
          flutter build ipa --release --export-options-plist=ios/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/ipa/*.dSYM
