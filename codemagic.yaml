workflows:
  ios-appstore:
    name: iOS App Store
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Build iOS
        script: |
          flutter build ipa --release \
            --export-options-plist=ios/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
