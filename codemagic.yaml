workflows:
  ios-appstore:
    name: iOS App Store
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.cizreapp.app
    triggering:
      branch_patterns:
        - pattern: main
          include: true
          source: false
      events:
        - push
        - tag
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Build iOS App Store
        script: |
          flutter build ipa --release \
            --export-method app-store
    artifacts:
      - build/ios/ipa/*.ipa
