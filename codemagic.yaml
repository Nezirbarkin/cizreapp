workflows:
  ios-simulator:
    name: iOS Simulator Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      branch_patterns:
        - pattern: main
          include: true
      events:
        - push
    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: iOS Dependencies
        script: |
          cd ios && pod install --repo-update && cd ..

      - name: Build iOS for Simulator
        script: |
          flutter build ios --simulator --no-codesign

    artifacts:
      - build/ios/iphonesimulator/*.app
