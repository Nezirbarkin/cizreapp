workflows:
  ios-appstore:
    name: iOS App Store
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      variables:
        APP_ID: '6453901378'
        ENGINE: xcode
    triggering:
      branch_patterns:
        - pattern: main
          include: true
          source: false
      events:
        - push
        - tag
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.cizreapp.app" --type IOS_APP_STORE --platform IOS --key-id $APP_STORE_CONNECT_KEY_ID --issuer-id $APP_STORE_CONNECT_ISSUER_ID --private-key @env:APP_STORE_CONNECT_PRIVATE_KEY --certificate-key @env:CERTIFICATE_KEY --output-dir './build/ios'
          keychain add-certificates --keychain default.keychain
          xcode-project use-profiles --keychain default.keychain
      - name: Build iOS App Store
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        app_id: $APP_ID
